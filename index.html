function getFacultyCode(name) { let f = FACULTY_DATA.find(f => f.name === name); return f ? f.code : ''; }
function getDeptCode(faculty, dept) { let f = FACULTY_DATA.find(f => f.name === faculty); if (!f) return ''; let d = f.departments.find(d => d.name === dept); return d ? d.code : ''; }
function getProgramCode(faculty, dept, program) {
    let f = FACULTY_DATA.find(f => f.name === faculty);
    if (!f) return '';
    let d = f.departments.find(d => d.name === dept);
    if (!d) return '';
    let idx = d.programs.indexOf(program);
    if (idx === -1) return '';
    return (idx + 1).toString().padStart(3, '0');
}
function getProgramDuration(faculty, dept, program) { let f = FACULTY_DATA.find(f => f.name === faculty); return f ? f.duration : 4; }

    let n = getNotifications();
    n.push({ id: Date.now(), userId, message, role, date: new Date().toISOString(), read: false });
    saveNotifications(n);
}
function getUnreadCount() {
    if (!currentUser) return 0;
    let n = getNotifications();
    return n.filter(x => x.userId == currentUser.id && !x.read).length;

// ==================== ROUTING ====================
function showView(view, params = {}) {
    let container = document.getElementById('appContainer');
    if (!currentUser) {
        if (view === 'register') renderRegister(container);
        else renderLogin(container);
        updateNavbar();
        return;
    }
    if (view === 'home') {
        if (currentUser.role === 'admin') renderAdminDashboard(container);
        else if (currentUser.role === 'lecturer') renderLecturerDashboard(container);
        else if (currentUser.role === 'accountant') renderAccountantDashboard(container);
        else renderStudentDashboard(container);
    } else if (view === 'login') { logout(); return; }
    else if (view === 'register') renderRegister(container);
    else if (currentUser.role === 'student') {
        switch(view) {
            case 'profile': renderStudentProfile(container); break;
            case 'timetables': renderStudentTimetables(container); break;
            case 'registerSem1': renderStudentRegistration(container, 1); break;
            case 'registerSem2': renderStudentRegistration(container, 2); break;
            case 'examCard': renderExamCard(container); break;
            case 'studentId': renderStudentId(container); break;
            case 'results': renderStudentResults(container); break;
            case 'requestSupp': renderRequestSupp(container); break;
            case 'clearance': renderClearance(container); break;
            case 'academicTracking': renderAcademicTracking(container); break;
            case 'feeDetails': renderStudentFeeDetails(container); break;
            case 'messages': renderMessages(container); break;
            default: renderStudentDashboard(container);
        }
    } else if (currentUser.role === 'admin') {
        switch(view) {
            case 'approveStudents': renderApproveStudents(container); break;
            case 'createLecturer': renderCreateLecturer(container); break;
            case 'createAccountant': renderCreateAccountant(container); break;
            case 'manageCourses': renderManageCourses(container); break;
            case 'manageStudents': renderManageStudents(container); break;
            case 'viewProfiles': renderViewProfiles(container); break;
            case 'timetableMgmt': renderTimetableMgmt(container); break;
            case 'examTimetableMgmt': renderExamTimetableMgmt(container); break;
            case 'uploadTimetable': renderUploadTimetable(container); break;
            case 'publishMarks': renderPublishMarks(container); break;
            case 'feeOverview': renderFeeOverview(container); break;
            case 'approveSupp': renderApproveSupp(container); break;
            case 'progression': renderProgression(container); break;
            case 'enrolledCourses': renderEnrolledCourses(container); break;
            case 'viewLists': renderViewLists(container); break;
            case 'messages': renderMessages(container); break;
            default: renderAdminDashboard(container);
        }
    } else if (currentUser.role === 'lecturer') {
        switch(view) {
            case 'myCourses': renderLecturerCourses(container); break;
            case 'enterMarks': renderLecturerMarks(container); break;
            case 'myTimetable': renderLecturerTimetable(container); break;
            case 'enrollmentStatus': renderEnrollmentStatus(container); break;
            case 'messages': renderMessages(container); break;
            default: renderLecturerDashboard(container);
        }
    } else if (currentUser.role === 'accountant') {
        switch(view) {
            case 'feeManagement': renderFeeManagement(container); break;
            case 'defaultersList': renderDefaultersList(container); break;
            case 'allFaculties': renderAllFaculties(container); break;
            case 'studentProfile': renderAccountantProfile(container, params.studentId); break;
            case 'messages': renderMessages(container); break;
            default: renderAccountantDashboard(container);
        }
    }
    updateNavbar();
}
function logout() { currentUser = null; localStorage.removeItem(STORAGE.CURRENT_USER); showView('login'); }
function updateNavbar() {
    let nav = document.getElementById('navLinks');
    if (!currentUser) { nav.innerHTML = '<li class="nav-item"><a class="nav-link text-white" href="#" onclick="showView(\'register\')">Register</a></li>'; return; }
    let unread = getUnreadCount();
    let badge = unread > 0 ? `<span class="badge-notify">${unread}</span>` : '';
    let msgLink = `<li class="nav-item"><a class="nav-link text-white" href="#" onclick="showView('messages')"><i class="bi bi-envelope"></i> Messages${badge}</a></li>`;
    let logoutLink = `<li class="nav-item"><a class="nav-link text-white" href="#" onclick="logout()">Logout</a></li>`;
    let nameSpan = `<li class="nav-item"><span class="nav-link text-white">👋 ${currentUser.name}</span></li>`;
    if (currentUser.role === 'student') {
        nav.innerHTML = `<li class="nav-item"><a class="nav-link text-white" href="#" onclick="showView('profile')">Profile</a></li>` + nameSpan + msgLink + logoutLink;
    } else {
        nav.innerHTML = nameSpan + msgLink + logoutLink;
    }
}

// ==================== LOGIN ====================
function renderLogin(container) {
    container.innerHTML = `
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4">
                    <h3 class="text-center mb-3"><i class="bi bi-box-arrow-in-right"></i> Login</h3>
                    <div id="loginError" class="alert alert-danger d-none"></div>
                    <input type="text" id="loginUser" class="form-control mb-2" placeholder="Username">
                    <input type="password" id="loginPass" class="form-control mb-3" placeholder="Password">
                    <button class="btn btn-primary w-100" onclick="doLogin()">Login</button>
                    <div class="text-center mt-3"><a href="#" onclick="showView('register')">Create Student Account</a></div>
                </div>
            </div>
        </div>`;
}
window.doLogin = function() {
    let user = document.getElementById('loginUser').value;
    let pass = document.getElementById('loginPass').value;
    let errDiv = document.getElementById('loginError');
    errDiv.classList.add('d-none');
    if (user === ADMIN.username && pass === ADMIN.password) {
        currentUser = { id: 'admin', username: 'admin', name: 'System Admin', role: 'admin' };
        localStorage.setItem(STORAGE.CURRENT_USER, JSON.stringify(currentUser));
        showView('home'); return;
    }
    let students = getStudents();
    let student = students.find(s => s.username === user && s.password === pass && s.status === 'approved');
    if (student) {
        currentUser = { id: student.id, username: student.username, name: student.name, role: 'student' };
        localStorage.setItem(STORAGE.CURRENT_USER, JSON.stringify(currentUser));
        showView('home'); return;
    }
    let lecturers = getLecturers();
    let lecturer = lecturers.find(l => l.username === user && l.password === pass);
    if (lecturer) {
        currentUser = { id: lecturer.id, username: lecturer.username, name: lecturer.name, role: 'lecturer' };
        localStorage.setItem(STORAGE.CURRENT_USER, JSON.stringify(currentUser));
        showView('home'); return;
    }
    let accountants = getAccountants();
    let accountant = accountants.find(a => a.username === user && a.password === pass);
    if (accountant) {
        currentUser = { id: accountant.id, username: accountant.username, name: accountant.name, role: 'accountant' };
        localStorage.setItem(STORAGE.CURRENT_USER, JSON.stringify(currentUser));
        showView('home'); return;
    }
    errDiv.classList.remove('d-none');
    errDiv.innerText = 'Invalid credentials or account not approved.';
};

                        <div class="col-md-6"><label>Registration Number*</label><input type="text" id="regNumber" class="form-control" readonly></div>
                        <div class="col-md-6"><label>Username*</label><input type="text" id="regUsername" class="form-control" required></div>
                        <div class="col-md-6"><label>Password*</label><input type="password" id="regPassword" class="form-control" value="password" required></div>
                        <div class="col-md-12"><label>Email*</label><input type="email" id="regEmail" class="form-control" required></div>
                        <div class="col-md-6"><label>Year of Study</label><input type="number" id="regYear" class="form-control" value="1" readonly></div>
                    </div>
                    <div class="mt-4"><button class="btn btn-primary" onclick="registerStudent()">Register</button> <button class="btn btn-secondary" onclick="showView('login')">Cancel</button></div>
                </div>
            </div>
        </div>`;
    let facultySelect = document.getElementById('regFaculty');
    facultySelect.innerHTML = '<option>Select Faculty</option>' + faculties.map(f => `<option value="${f}">${f}</option>`).join('');
    window.updateRegDept = function() {
        let faculty = document.getElementById('regFaculty').value;
        let deptSelect = document.getElementById('regDept');
        let f = FACULTY_DATA.find(f => f.name === faculty);
        if (f) {
            deptSelect.innerHTML = '<option>Select Department</option>' + f.departments.map(d => `<option value="${d.name}">${d.name}</option>`).join('');
            updateRegProgram();
        }
    };
    window.updateRegProgram = function() {
        let faculty = document.getElementById('regFaculty').value;
        let dept = document.getElementById('regDept').value;
        let progSelect = document.getElementById('regProgram');
        let f = FACULTY_DATA.find(f => f.name === faculty);
        if (f) {
            let d = f.departments.find(d => d.name === dept);
            if (d) progSelect.innerHTML = '<option>Select Program</option>' + d.programs.map(p => `<option value="${p}">${p}</option>`).join('');
            generateRegNumber();
        }
    };
    window.generateRegNumber = function() {
        let faculty = document.getElementById('regFaculty').value;
        let dept = document.getElementById('regDept').value;
        let program = document.getElementById('regProgram').value;
        if (!faculty || !dept || !program) return;
        let fCode = getFacultyCode(faculty);
        let dCode = getDeptCode(faculty, dept);
        let pCode = getProgramCode(faculty, dept, program);
        let year = new Date().getFullYear();
        let students = getStudents();
        let prefix = `${fCode}${dCode}/${pCode}/`;
        let existing = students.filter(s => s.regNumber && s.regNumber.startsWith(prefix));
        let num = (existing.length + 1).toString().padStart(4, '0');
        document.getElementById('regNumber').value = `${fCode}${dCode}/${pCode}/${num}/${year}`;
    };
}
window.registerStudent = function() {
    let students = getStudents();
    let username = document.getElementById('regUsername').value;
    let email = document.getElementById('regEmail').value;
    if (students.some(s => s.username === username)) { alert('Username exists'); return; }
    if (students.some(s => s.email === email)) { alert('Email exists'); return; }
    let newId = students.length ? Math.max(...students.map(s => s.id)) + 1 : 1;
    let faculty = document.getElementById('regFaculty').value;
    let dept = document.getElementById('regDept').value;
    let program = document.getElementById('regProgram').value;
    let regNumber = document.getElementById('regNumber').value;
    let newStudent = {
        id: newId, username: username, password: document.getElementById('regPassword').value,
        name: document.getElementById('regName').value, gender: document.getElementById('regGender').value,
        regNumber: regNumber, yearOfStudy: 1, faculty: faculty, department: dept, program: program,
        email: email, status: 'pending', programDuration: getProgramDuration(faculty, dept, program)
    };
    students.push(newStudent);
    saveStudents(students);
    alert('Registration submitted! Admin will approve your account.');
    showView('login');
};

function renderStudentRegistration(container, semester) {
    let s = getStudents().find(s => s.id === currentUser.id);
    let courses = getCourses().filter(c => c.faculty === s.faculty && c.department === s.department && c.program === s.program && c.year === s.yearOfStudy && c.semester === semester);
    let enrolls = getEnrollments().filter(e => e.studentId === s.id && e.semester === semester);
    let selected = enrolls.map(e => e.courseId);
    let fees = getFees().filter(f => f.studentId === s.id && f.type === 'tuition' && f.year === s.yearOfStudy);
    let paid = fees.reduce((a,b) => a + b.amount, 0);
    let required = semester === 1 ? 30000 : 60000;
    let canRegister = paid >= required;
    let html = `<div class="card p-4"><h4>Register Semester ${semester}</h4><p>${canRegister ? '<span class="text-success">✅ Fee requirement met</span>' : '<span class="text-danger">⚠️ Need KES ' + required + ' paid</span>'}</p>`;
    if (canRegister && courses.length) {
        html += `<form id="regForm"><div class="row">`;
        courses.forEach(c => {
            html += `<div class="col-md-6"><input type="checkbox" value="${c.id}" id="c${c.id}" ${selected.includes(c.id) ? 'checked' : ''}> <label for="c${c.id}">${c.code} - ${c.name}</label></div>`;
        });
        html += `</div><button class="btn btn-primary mt-3" onclick="saveRegistration(${semester})">Save Registration</button></form>`;
    } else if (courses.length === 0) {
        html += `<div class="alert alert-warning">No courses available for this semester. Please contact admin.</div>`;
    } else {
        html += `<div class="alert alert-warning">You cannot register until fees are paid.</div>`;
    }
    html += `<button class="btn btn-secondary mt-3" onclick="showView('home')">Back</button></div>`;
    container.innerHTML = html;
    window.saveRegistration = (sem) => {
        let selectedIds = [];
        courses.forEach(c => {
            let cb = document.getElementById(`c${c.id}`);
            if (cb && cb.checked) selectedIds.push(c.id);
        });
        if (selectedIds.length > 5) { alert('Maximum 5 courses per semester'); return; }
        let enrolls = getEnrollments().filter(e => !(e.studentId === s.id && e.semester === sem));
        selectedIds.forEach(cid => enrolls.push({ studentId: s.id, courseId: cid, semester: sem }));
        saveEnrollments(enrolls);
        alert('Registration saved');
        showView('home');
    };
}

    window.updateCourseDept = () => {

        let deptSel = document.getElementById('courseDept');
        let f = FACULTY_DATA.find(f => f.name === fac);
        if (f) deptSel.innerHTML = '<option>Select Department</option>' + f.departments.map(d => `<option value="${d.name}">${d.name}</option>`).join('');
        updateCourseProg();
    };
    window.updateCourseProg = () => {
        let fac = document.getElementById('courseFac').value;
        let dept = document.getElementById('courseDept').value;
        let progSel = document.getElementById('courseProg');
        let f = FACULTY_DATA.find(f => f.name === fac);
        if (f) {
            let d = f.departments.find(d => d.name === dept);
            if (d) progSel.innerHTML = '<option>Select Program</option>' + d.programs.map(p => `<option value="${p}">${p}</option>`).join('');
        }
    };
    window.addCourse = () => {
        let courses = getCourses();
        let newId = courses.length ? Math.max(...courses.map(c => c.id)) + 1 : 1;
        let fac = document.getElementById('courseFac').value;
        let dept = document.getElementById('courseDept').value;
        let prog = document.getElementById('courseProg').value;
        if (!fac || !dept || !prog) { alert('Please select faculty, department, program'); return; }
        courses.push({
            id: newId, code: document.getElementById('courseCode').value, name: document.getElementById('courseName').value,
            hours: parseInt(document.getElementById('courseHours').value), semester: parseInt(document.getElementById('courseSem').value),
            year: parseInt(document.getElementById('courseYear').value), faculty: fac, department: dept, program: prog,
            lecturerId: null
        });
        saveCourses(courses);
        alert('Course added');
        showView('manageCourses');
    };
    window.assignLecturer = (id, lecId) => { let c = getCourses().find(c => c.id === id); if (c) { c.lecturerId = lecId ? parseInt(lecId) : null; saveCourses(getCourses()); } };
    window.editCourse = (id) => { let c = getCourses().find(c => c.id === id); if (c) { let n = prompt('New name:', c.name); if (n) c.name = n; let h = prompt('New hours:', c.hours); if (h) c.hours = parseInt(h); saveCourses(getCourses()); showView('manageCourses'); } };
    window.deleteCourse = (id) => { let courses = getCourses().filter(c => c.id !== id); saveCourses(courses); showView('manageCourses'); };
    window.downloadCourseTemplate = () => { let content = 'code,name,hours,semester,year,faculty,department,program\n'; const blob = new Blob([content], { type: 'text/csv' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'course_template.csv'; a.click(); URL.revokeObjectURL(a.href); };
    window.uploadCourses = () => {
        let file = document.getElementById('courseUpload').files[0];
        if (!file) return;
        let reader = new FileReader();
        reader.onload = (e) => {
            let lines = e.target.result.split('\n');
            let headers = lines[0].split(',').map(h => h.trim().toLowerCase());
            let courses = getCourses();
            let maxId = courses.length ? Math.max(...courses.map(c => c.id)) : 0;
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                let vals = lines[i].split(',').map(v => v.trim());
                let row = {};
                headers.forEach((h, idx) => { row[h] = vals[idx]; });
                if (row.code && row.name) {
                    maxId++;
                    courses.push({
                        id: maxId, code: row.code, name: row.name, hours: parseInt(row.hours) || 0,
                        semester: parseInt(row.semester) || 1, year: parseInt(row.year) || 1,
                        faculty: row.faculty || '', department: row.department || '', program: row.program || '',
                        lecturerId: null
                    });
                }
            }
            saveCourses(courses);
            alert('Courses uploaded');
            showView('manageCourses');
        };
        reader.readAsText(file);
    };
}

function renderUploadTimetable(container) {
    container.innerHTML = `<div class="card p-4"><h4>Upload Class Timetable CSV</h4><p>Download template, fill, and upload.</p><button class="btn btn-outline-primary mb-2" onclick="downloadTimetableTemplate()">Download Template</button><input type="file" id="ttUpload" accept=".csv" class="form-control mb-2"><button class="btn btn-primary" onclick="uploadTimetableFile()">Upload & Replace</button><button class="btn btn-secondary mt-3" onclick="showView('home')">Back</button></div>`;
    window.downloadTimetableTemplate = () => {
        let headers = ['Day','Time','Course Code','Course Name','Faculty','Department','Program','Year','Semester','Venue'];
        let content = headers.join(',') + '\n';
        const blob = new Blob([content], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'class_timetable_template.csv';
        a.click();
        URL.revokeObjectURL(a.href);
    };
    window.uploadTimetableFile = () => {
        let file = document.getElementById('ttUpload').files[0];
        if (!file) return;
        let reader = new FileReader();
        reader.onload = (e) => {
            let lines = e.target.result.split('\n');
            let headers = lines[0].split(',').map(h => h.trim());
            let data = [];
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                let vals = lines[i].split(',').map(v => v.trim());
                let row = {};
                headers.forEach((h, idx) => { row[h] = vals[idx]; });
                data.push(row);
            }
            saveClassTT(data);
            alert('Timetable uploaded and replaced.');
            showView('timetableMgmt');
        };
        reader.readAsText(file);
    };
}

    };
    window.progUpdateProgram = () => {

        let fac = document.getElementById('progFac').value;

        let prog = document.getElementById('progProgram').value;
        let students = getStudents().filter(s => s.faculty === fac && s.department === dept && s.program === prog && s.status === 'approved');
        let eligible = students.filter(s => {
            let marks = getMarks().filter(m => m.studentId === s.id && m.published);
            let passed = marks.filter(m => m.grade !== 'E').length;
            return passed >= 8 && s.yearOfStudy < s.programDuration;
        });
        let html = `<table class="table mt-3"><thead><tr><th>Name</th><th>Reg No</th><th>Current Year</th><th>Action</th></tr></thead><tbody>${eligible.map(s => `<tr><td>${s.name}</td><td>${s.regNumber}</td><td>${s.yearOfStudy}</td><td><button class="btn btn-sm btn-primary" onclick="progressStudent(${s.id})">Progress</button> <button class="btn btn-sm btn-danger" onclick="noProgress(${s.id})">No Progression</button></td></tr>`).join('')}</tbody></table>${eligible.length === 0 ? '<p>No eligible students</p>' : ''}`;
        document.getElementById('progList').innerHTML = html;
    };
    window.progressStudent = (id) => {
        let students = getStudents();
        let s = students.find(s => s.id === id);
        if (s && s.yearOfStudy < s.programDuration) {
            s.yearOfStudy++;
            saveStudents(students);
            let prog = getProgressions();
            prog.push({ studentId: id, progressedToYear: s.yearOfStudy, date: new Date().toISOString() });
            saveProgressions(prog);
            addNotification(id, `You have been progressed to Year ${s.yearOfStudy}`, 'student');
            alert('Progressed');
            loadProgStudents();
        }
    };
    window.noProgress = (id) => {
        let reason = prompt('Reason for not progressing (will be sent to student):');
        if (reason) { addNotification(id, `Progression not granted: ${reason}`, 'student'); alert('Notification sent'); }
    };
}

function renderLecturerMarks(container) {

    let students = getStudents();

    let pendingOptions = '';
    for (let c of courses) {
        let enrolls = getEnrollments().filter(e => e.courseId === c.id);
        let marks = getMarks().filter(m => m.courseId === c.id);
        let pending = [];
        for (let e of enrolls) {
            let first = marks.find(m => m.studentId === e.studentId && !m.isSupplementary);
            let supp = marks.find(m => m.studentId === e.studentId && m.isSupplementary);

            else if (first.grade === 'E' && !supp) pending.push(e.studentId);
        }
        if (pending.length) pendingOptions += `<option value="${c.id}" data-students='${JSON.stringify(pending)}'>${c.code} - ${c.name}</option>`;
    }
    if (!pendingOptions) {
        html += `<p>All marks entered for your courses.</p>`;
    } else {
        html += `<select id="markCourse" class="form-select mb-2" onchange="updateMarkStudents()">${pendingOptions}</select>
        <select id="markStudent" class="form-select mb-2"></select>
        <input id="markCat" type="number" class="form-control mb-2" placeholder="CAT (0-30)" min="0" max="30">
        <input id="markExam" type="number" class="form-control mb-2" placeholder="Exam (0-70)" min="0" max="70">
        <div class="mb-2"><input type="checkbox" id="markSupp"> <label>Supplementary Exam</label></div>
        <button class="btn btn-primary" onclick="saveLecturerMarks()">Save Marks</button>`;
    }
    html += `<button class="btn btn-secondary mt-3" onclick="showView('home')">Back</button></div>`;
    container.innerHTML = html;
    window.updateMarkStudents = () => {
        let sel = document.getElementById('markCourse');
        let opt = sel.options[sel.selectedIndex];
        let ids = JSON.parse(opt.getAttribute('data-students') || '[]');
        let studentSel = document.getElementById('markStudent');
        studentSel.innerHTML = ids.map(id => { let s = students.find(st => st.id === id); return `<option value="${id}">${s?.name} (${s?.regNumber})</option>`; }).join('');
    };
    window.saveLecturerMarks = () => {
        let cid = parseInt(document.getElementById('markCourse').value);
        let sid = parseInt(document.getElementById('markStudent').value);
        let cat = parseFloat(document.getElementById('markCat').value);
        let exam = parseFloat(document.getElementById('markExam').value);
        let total = cat + exam;
        let grade = total >= 71 ? 'A' : total >= 61 ? 'B' : total >= 51 ? 'C' : total >= 40 ? 'D' : 'E';
        let isSupp = document.getElementById('markSupp').checked;
        let marks = getMarks();
        let existing = marks.find(m => m.studentId === sid && m.courseId === cid && m.isSupplementary === isSupp);
        if (existing) {
            existing.cat = cat; existing.exam = exam; existing.total = total; existing.grade = grade; existing.published = false;

        let enrolls = getEnrollments().filter(e => e.courseId == cid);
        let enrolledIds = enrolls.map(e => e.studentId);
        let list = type === 'enrolled' ? students.filter(s => enrolledIds.includes(s.id)) : students.filter(s => !enrolledIds.includes(s.id));
        let content = `Reg Number,Name,Year\n` + list.map(s => `${s.regNumber},${s.name},${s.yearOfStudy}`).join('\n');
        const blob = new Blob([content], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${type}_${course.code}.csv`;
        a.click();
        URL.revokeObjectURL(a.href);
    };
    window.sendListToAdmin = (cid, type) => {
        let course = getCourses().find(c => c.id == cid);
        let students = getStudents().filter(s => s.faculty === course.faculty && s.department === course.department && s.program === course.program && s.yearOfStudy == course.year && s.status === 'approved');
        let enrolls = getEnrollments().filter(e => e.courseId == cid);
        let enrolledIds = enrolls.map(e => e.studentId);
        let list = type === 'enrolled' ? students.filter(s => enrolledIds.includes(s.id)) : students.filter(s => !enrolledIds.includes(s.id));
        let adminLists = getAdminLists();
        adminLists.push({
            id: Date.now(), from: currentUser.id, fromName: currentUser.name,
            courseCode: course.code, courseName: course.name, semester: course.semester, year: course.year,
            type: type, students: list.map(s => ({ regNumber: s.regNumber, name: s.name, year: s.yearOfStudy })),
            date: new Date().toISOString(), read: false
        });
        saveAdminLists(adminLists);
        addNotification('admin', `New list from ${currentUser.name}: ${type} students for ${course.code}`, 'admin');
        alert('List sent to admin');
    };
}

// ==================== ACCOUNTANT FUNCTIONS ====================
function renderAccountantDashboard(container) {
    container.innerHTML = `<div class="welcome-banner"><h3>Accountant: ${currentUser.name}</h3>${getUnreadCount() > 0 ? `<div class="alert alert-info">📬 ${getUnreadCount()} new notifications</div>` : ''}</div>
        <div class="row g-3">
            ${adminCard('💰', 'Record Payment', 'feeManagement')}
            ${adminCard('📜', 'Defaulters List', 'defaultersList')}
            ${adminCard('📚', 'All Faculties', 'allFaculties')}
            <div class="col-md-4 col-lg-3"><div class="dashboard-card"><i class="bi bi-person fs-1"></i><h6>Student Profile</h6><input id="searchRegNo" class="form-control mt-2" placeholder="Reg Number"><button class="btn btn-sm btn-primary mt-2" onclick="searchByReg()">Search</button></div></div>
        </div>`;
    window.searchByReg = () => { let reg = document.getElementById('searchRegNo').value; let s = getStudents().find(s => s.regNumber === reg); if (s) showView('studentProfile', { studentId: s.id }); else alert('Student not found'); };
}
function renderFeeManagement(container) {
    let students = getStudents();
    container.innerHTML = `<div class="card p-4"><h4>Record Payment</h4><select id="payStudent" class="form-select mb-2">${students.map(s => `<option value="${s.id}">${s.name} (${s.regNumber})</option>`).join('')}</select><select id="payType" class="form-select mb-2"><option value="tuition">Tuition</option><option value="accommodation">Accommodation</option></select><input id="payAmount" type="number" class="form-control mb-2" placeholder="Amount"><input id="payYear" type="number" class="form-control mb-2" placeholder="Academic Year"><button class="btn btn-primary" onclick="recordPayment()">Record</button><button class="btn btn-secondary mt-3" onclick="showView('home')">Back</button></div>`;
    window.recordPayment = () => {
        let sid = parseInt(document.getElementById('payStudent').value);
        let type = document.getElementById('payType').value;
        let amount = parseFloat(document.getElementById('payAmount').value);
        let year = parseInt(document.getElementById('payYear').value);
        let fees = getFees();
        fees.push({ id: Date.now(), studentId: sid, type, amount, year, date: new Date().toISOString() });
        saveFees(fees);
        alert('Payment recorded');
        showView('feeManagement');
    };
}
function renderDefaultersList(container) {
    let students = getStudents();
    let fees = getFees();
    let defaulters = students.filter(s => {
        let paid = fees.filter(f => f.studentId === s.id && f.type === 'tuition').reduce((a,b) => a + b.amount, 0);
        return paid < s.programDuration * 60000;
    });
    container.innerHTML = `<div class="card p-4"><h4>Defaulters List</h4><table class="table"><thead><tr><th>Name</th><th>Reg No</th><th>Paid</th><th>Required</th><th>Balance</th></tr></thead><tbody>${defaulters.map(s => { let paid = fees.filter(f => f.studentId === s.id && f.type === 'tuition').reduce((a,b) => a + b.amount, 0); let required = s.programDuration * 60000; return `<tr><td>${s.name}</td><td>${s.regNumber}</td><td>KES ${paid}</td><td>KES ${required}</td><td>KES ${Math.max(0, required - paid)}</td></tr>`; }).join('')}</tbody></table><button class="btn btn-secondary" onclick="window.print()">Print</button><button class="btn btn-secondary ms-2" onclick="showView('home')">Back</button></div>`;
}
function renderAllFaculties(container) {
    let faculties = FACULTY_DATA.map(f => f.name);
    container.innerHTML = `<div class="card p-4"><h4>Faculties</h4><div class="list-group">${faculties.map(f => `<a href="#" class="list-group-item list-group-item-action" onclick="viewFacultyStudents('${f}')">${f}</a>`).join('')}</div><button class="btn btn-secondary mt-3" onclick="showView('home')">Back</button></div>`;
    window.viewFacultyStudents = (fac) => {
        let depts = FACULTY_DATA.find(f => f.name === fac).departments;
        let html = `<div class="card p-4"><h4>${fac} - Departments</h4><div class="list-group">${depts.map(d => `<a href="#" class="list-group-item list-group-item-action" onclick="viewDeptStudents('${fac}','${d.name}')">${d.name}</a>`).join('')}</div><button class="btn btn-secondary mt-3" onclick="showView('allFaculties')">Back</button></div>`;
        document.getElementById('appContainer').innerHTML = html;
    };
    window.viewDeptStudents = (fac, dept) => {
        let programs = FACULTY_DATA.find(f => f.name === fac).departments.find(d => d.name === dept).programs;
        let html = `<div class="card p-4"><h4>${dept} - Programs</h4><div class="list-group">${programs.map(p => `<a href="#" class="list-group-item list-group-item-action" onclick="viewProgramStudents('${fac}','${dept}','${p}')">${p}</a>`).join('')}</div><button class="btn btn-secondary mt-3" onclick="viewFacultyStudents('${fac}')">Back</button></div>`;
        document.getElementById('appContainer').innerHTML = html;
    };
    window.viewProgramStudents = (fac, dept, prog) => {
        let students = getStudents().filter(s => s.faculty === fac && s.department === dept && s.program === prog && s.status === 'approved');
        let fees = getFees();
        let html = `<div class="card p-4"><h4>${prog} Students</h4><table class="table"><thead><tr><th>Name</th><th>Reg No</th><th>Year</th><th>Tuition Paid</th><th>Accom Paid</th><th>Action</th></tr></thead><tbody>${students.map(s => { let tuition = fees.filter(f => f.studentId === s.id && f.type === 'tuition').reduce((a,b) => a + b.amount, 0); let accom = fees.filter(f => f.studentId === s.id && f.type === 'accommodation').reduce((a,b) => a + b.amount, 0); return `<tr><td>${s.name}</td><td>${s.regNumber}</td><td>${s.yearOfStudy}</td><td>KES ${tuition}</td><td>KES ${accom}</td><td><button class="btn btn-sm btn-primary" onclick="showView('studentProfile',{studentId:${s.id}})">View</button></td></tr>`; }).join('')}</tbody></table><button class="btn btn-secondary mt-3" onclick="viewDeptStudents('${fac}','${dept}')">Back</button></div>`;
        document.getElementById('appContainer').innerHTML = html;
    };
}
function renderAccountantProfile(container, id) {
    let s = getStudents().find(s => s.id === id);
    if (!s) { container.innerHTML = '<div class="alert alert-danger">Student not found</div><button class="btn btn-secondary" onclick="showView(\'home\')">Back</button>'; return; }
    let fees = getFees().filter(f => f.studentId === s.id);
    let tuitionPaid = fees.filter(f => f.type === 'tuition').reduce((a,b) => a + b.amount, 0);
    let accomPaid = fees.filter(f => f.type === 'accommodation').reduce((a,b) => a + b.amount, 0);
    let requiredTuition = s.programDuration * 60000;
    let requiredAccom = s.programDuration * 20000;
    let notifs = getNotifications().filter(n => n.userId == s.id);
    container.innerHTML = `<div class="card p-4"><h4>${s.name}</h4><div>Reg: ${s.regNumber}</div><div>Faculty: ${s.faculty}</div><div>Dept: ${s.department}</div><div>Program: ${s.program}</div><div>Year: ${s.yearOfStudy}</div><hr><h5>Fees</h5><div>Tuition Paid: KES ${tuitionPaid} / ${requiredTuition}</div><div>Accommodation Paid: KES ${accomPaid} / ${requiredAccom}</div><input id="editTuition" class="form-control mt-2" value="${tuitionPaid}" placeholder="Tuition Paid"><input id="editAccom" class="form-control mt-2" value="${accomPaid}" placeholder="Accommodation Paid"><button class="btn btn-primary mt-2" onclick="updateFees(${s.id})">Update Fees</button><hr><h5>Notifications</h5><div id="notifArea">${notifs.map(n => `<div class="notification-item">${new Date(n.date).toLocaleString()}: ${n.message}</div>`).join('') || '<p>No notifications</p>'}</div><textarea id="notifMsg" class="form-control mt-2" rows="2" placeholder="Send notification..."></textarea><button class="btn btn-primary mt-2" onclick="sendNotifToStudent(${s.id})">Send Notification</button><button class="btn btn-secondary mt-3" onclick="showView('home')">Back</button></div>`;
    window.updateFees = (sid) => {
        let newTuition = parseFloat(document.getElementById('editTuition').value);
        let newAccom = parseFloat(document.getElementById('editAccom').value);
        let fees = getFees().filter(f => f.studentId !== sid);
        if (newTuition > 0) fees.push({ id: Date.now(), studentId: sid, type: 'tuition', amount: newTuition, year: s.yearOfStudy, date: new Date().toISOString() });
        if (newAccom > 0) fees.push({ id: Date.now(), studentId: sid, type: 'accommodation', amount: newAccom, year: s.yearOfStudy, date: new Date().toISOString() });
        saveFees(fees);
        alert('Fees updated');
        showView('studentProfile', { studentId: sid });
    };
    window.sendNotifToStudent = (sid) => {
        let msg = document.getElementById('notifMsg').value;
        if (msg) { addNotification(sid, msg, 'student'); document.getElementById('notifMsg').value = ''; alert('Notification sent'); showView('studentProfile', { studentId: sid }); }
    };
}

// ==================== MESSAGES ====================
function renderMessages(container) {
    let msgs = getMessages().filter(m => m.to === currentUser.username || m.from === currentUser.username);
    container.innerHTML = `<div class="card p-4"><h4>Messages</h4><button class="btn btn-primary mb-3" onclick="showNewMessage()">New Message</button><div id="msgList">${msgs.sort((a,b) => b.timestamp - a.timestamp).map(m => `<div class="message-item" onclick="viewMessage(${m.id})"><strong>${m.from === currentUser.username ? 'To: ' + m.to : 'From: ' + m.from}</strong><br><small>${new Date(m.timestamp).toLocaleString()}</small><br>${m.subject}${!m.read && m.to === currentUser.username ? ' <span class="badge bg-danger">New</span>' : ''}</div>`).join('')}</div>${msgs.length === 0 ? '<p>No messages</p>' : ''}<button class="btn btn-secondary mt-3" onclick="showView('home')">Back</button></div>`;
    window.showNewMessage = () => {
        let recipients = [];
        if (currentUser.role === 'admin') {
            recipients = [...getLecturers(), ...getAccountants(), ...getStudents()];
        } else if (currentUser.role === 'lecturer') {
            recipients = [{ username: 'admin', name: 'Admin', role: 'admin' }, ...getStudents()];
        } else if (currentUser.role === 'accountant') {
            recipients = [{ username: 'admin', name: 'Admin', role: 'admin' }, ...getStudents()];
        } else if (currentUser.role === 'student') {
            recipients = [{ username: 'admin', name: 'Admin', role: 'admin' }, ...getLecturers(), ...getAccountants()];
        }
        let html = `<div class="card mt-3 p-3"><h5>New Message</h5><select id="msgTo" class="form-select mb-2">${recipients.map(r => `<option value="${r.username}">${r.name} (${r.role})</option>`).join('')}</select><input id="msgSubject" class="form-control mb-2" placeholder="Subject"><textarea id="msgBody" class="form-control mb-2" rows="3" placeholder="Message"></textarea><button class="btn btn-primary" onclick="sendNewMessage()">Send</button><button class="btn btn-secondary ms-2" onclick="showView('messages')">Cancel</button></div>`;
        document.getElementById('msgList').insertAdjacentHTML('beforebegin', html);
    };
    window.sendNewMessage = () => {
        let to = document.getElementById('msgTo').value;
        let subject = document.getElementById('msgSubject').value;
        let body = document.getElementById('msgBody').value;
        if (!to || !subject || !body) { alert('All fields required'); return; }
        let msgs = getMessages();
        msgs.push({ id: Date.now(), from: currentUser.username, to, subject, body, timestamp: Date.now(), read: false });
        saveMessages(msgs);
        let allUsers = [...getStudents(), ...getLecturers(), ...getAccountants()];
        let recip = allUsers.find(u => u.username === to);
        if (recip) addNotification(recip.id, `New message from ${currentUser.name}: ${subject}`, recip.role);
        else if (to === 'admin') addNotification('admin', `New message from ${currentUser.name}: ${subject}`, 'admin');
        alert('Message sent');
        showView('messages');
    };
    window.viewMessage = (id) => {
        let msgs = getMessages();
        let msg = msgs.find(m => m.id === id);
        if (!msg) return;
        if (!msg.read && msg.to === currentUser.username) { msg.read = true; saveMessages(msgs); }
        let html = `<div class="card p-3"><strong>From:</strong> ${msg.from}<br><strong>To:</strong> ${msg.to}<br><strong>Date:</strong> ${new Date(msg.timestamp).toLocaleString()}<br><strong>Subject:</strong> ${msg.subject}<br><hr>${msg.body.replace(/\n/g, '<br>')}</div>
        <div class="card mt-3 p-3"><h5>Reply</h5><input id="replySubject" class="form-control mb-2" value="Re: ${msg.subject}"><textarea id="replyBody" class="form-control mb-2" rows="3"></textarea><button class="btn btn-primary" onclick="sendReply(${msg.id})">Send Reply</button><button class="btn btn-secondary ms-2" onclick="showView('messages')">Cancel</button></div>`;
        document.getElementById('msgList').innerHTML = html;
    };
    window.sendReply = (origId) => {
        let orig = getMessages().find(m => m.id === origId);
        let to = orig.from;
        let subject = document.getElementById('replySubject').value;
        let body = document.getElementById('replyBody').value;
        if (!subject || !body) { alert('All fields required'); return; }
        let msgs = getMessages();
        msgs.push({ id: Date.now(), from: currentUser.username, to, subject, body, timestamp: Date.now(), read: false });
        saveMessages(msgs);
        let allUsers = [...getStudents(), ...getLecturers(), ...getAccountants()];
        let recip = allUsers.find(u => u.username === to);
        if (recip) addNotification(recip.id, `New message from ${currentUser.name}: ${subject}`, recip.role);
        else if (to === 'admin') addNotification('admin', `New message from ${currentUser.name}: ${subject}`, 'admin');
        alert('Reply sent');
        showView('messages');
    };
}

// Start app
showView(currentUser ? 'home' : 'login');
</script>
